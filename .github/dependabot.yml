# Weekly dependency updates. Minor and patch npm updates are grouped into a
# single PR to limit noise; major updates get individual PRs.
# Note: Dependabot only reads this file from the default branch (main).

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Must not exceed engines.vscode (vsce refuses to package otherwise);
      # its minor version tracks the VS Code API, so only allow patches.
      - dependency-name: "@types/vscode"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
