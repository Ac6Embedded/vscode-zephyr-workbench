# Continuous integration: build, lint, and test on every push and pull request.
# Also produces an installable VSIX artifact for each run.

name: CI

on:
  push:
    branches: [main, pre-release]
  pull_request:
    branches: [main, pre-release]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck and bundle
        run: npm run package

      - name: Unit tests
        run: npm run test:unit

      - name: Package VSIX
        run: npx vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-workbench-vsix
          path: "*.vsix"
          retention-days: 7
