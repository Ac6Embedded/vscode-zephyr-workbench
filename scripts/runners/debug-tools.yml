- tool: stm32cubeprogrammer
  name: STM32CubeProgrammer
  version: 2.17.0 
  version-command:
    windows: STM32_Programmer_CLI.exe --version
    linux: STM32_Programmer_CLI --version
    darwin: STM32_Programmer_CLI --version
  version-regex: '/STM32CubeProgrammer version: ([\d.]+)/'
  website: https://www.st.com/en/development-tools/stm32cubeprog.html
  vendor: ST
  type: flasher
  group: STM32
  root: false
# Auto-detect common installation paths, use wildcards as needed:
# "*" → multiple characters (e.g., any version number)
# "?" → exactly one character
  auto-detect:
    windows:
      - "C:/Program Files/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin"
      - "C:/Program Files (x86)/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin"
      - "C:/ST/STM32CubeCLT_*/STM32CubeProgrammer/bin"
    linux:
      - "/usr/local/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin"
      - "/opt/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin"
      - "/usr/bin/STM32_Programmer_CLI"
      - "/usr/local/bin/STM32_Programmer_CLI"
      - "${HOME}/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin"
    darwin:
      - "/Applications/STMicroelectronics/STM32CubeProgrammer/STM32CubeProgrammer.app/Contents/MacOS/bin"
      - "/Applications/STM32CubeProgrammer/STM32CubeProgrammer.app/Contents/MacOS/bin"
- tool: stm32cubeclt
  name: STM32CubeCLT
  version: 1.21.0
  tooltip: It includes most of the STM32 tools, including the ST-LINK GDB Server, STM32CubeProgrammer and the SVDs 
  version-source: detect-path
  version-regex: '/STM32CubeCLT_([\d.]+)/i'
  website: https://www.st.com/en/development-tools/stm32cubeclt.html#section-get-software-table
  vendor: ST
  type: debug_server
  group: STM32
  root: false
  no_edit: true
  # Detect the bundled ST-LINK GDB Server directory and extract the package
  # version from the matched STM32CubeCLT_<version> path segment.
  explicit-detect:
    windows:
      - "C:/ST/STM32CubeCLT_*/STLink-gdb-server/bin"
    linux:
      - "/opt/st/STM32CubeCLT_*/STLink-gdb-server/bin"
    darwin:
      - "/opt/ST/STM32CubeCLT_*/STLink-gdb-server/bin"
